front:
  text: 尚理編序天地不言之聖人也聖人有言之天地也皇皇焉廓矣寥矣若陽和之生萬物無意無蹤無一物不被其澤而得藉其生焉是為聖人也三教聖人教人為善教人明道此無他共助國家之政化也老子之教至於莊列之後變為正一修鍊等流正一未暇論之鍊術睽其真矣無本可歸惟事憍倨而至竊攻吾教也余不欲言人之不善奈何彼流無狀靡所不至折佛經造彼經折禪書造彼書及行謗佛實紀昌之徒也偽造文集曰有僧坐山三十年不得悟道仙人化為道士謂此僧曰汝空坐也從我道法是以此僧從其修鍊如是謬造經書相繼不絶世人遭其熒惑可勝道哉余以納諸虛懷不與之較茲因繆道士妄造神化圖以黃龍洞賔之語更換而説之虛架陋辭粧扶屈曲擅以刻板印行世之不識邪正者競以彼圖揭之於室矧相傳誦余不忍觀故著是編以諭之語雖不文理亦頗當故以尚理名其編云凡𨵿乎三教聖人教門之事皆置之而不言彼以鍊術欲擬吾宗之道是故惟言鍊術而已實為救其迷也夫鍊術者形氣之學屬乎數量成壞之法也似乎靈明者神識也神識也者精魂也精魂也者妄情也妄情也者生死之本也惟藉神識凝想之力死為中隂界中神靈而已有德者名地仙次德者神靈也又次德者鬼靈也中隂報盡皆入輪回嗚呼蠛蠓擬類大鵬識者之所哂也余言尚理實不存私覽者勿存勝負之疑可也苟能因是有悟覺今是而昨非如洞實曰今朝一見黃龍後始覺從前枉用心是則不使徒然得此人身獲聞真正之道庶無負聖天子重熙纍洽之化育也正統五年五月中浣中吳沙門空谷景隆序
